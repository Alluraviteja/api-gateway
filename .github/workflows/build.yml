name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

concurrency:
  group: docker-build
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: true
          sbom: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
            ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy routes.yaml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: routes.yaml
          target: ~/gateway/
          overwrite: true

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.sha }}

            # Pull new image before stopping old container to minimise downtime
            docker pull $IMAGE

            # Keep track of previous image for rollback (empty string if first deploy)
            PREVIOUS_IMAGE=$(docker inspect --format='{{.Config.Image}}' api-gateway 2>/dev/null || echo "")

            # Swap containers
            docker stop api-gateway || true
            docker rm api-gateway || true
            docker run -d \
              --name api-gateway \
              --restart always \
              -e PORT=${{ secrets.PORT }} \
              -e LOG_LEVEL=${{ secrets.LOG_LEVEL }} \
              -e RATE_LIMITER_URL=${{ secrets.RATE_LIMITER_URL }} \
              -e ALLOW_PASSTHROUGH=${{ secrets.ALLOW_PASSTHROUGH }} \
              -e MAX_BODY_MB=${{ secrets.MAX_BODY_MB }} \
              -e REQUEST_TIMEOUT_SECONDS=${{ secrets.REQUEST_TIMEOUT_SECONDS }} \
              -e METRICS_TOKEN=${{ secrets.METRICS_TOKEN }} \
              -e ROUTES_FILE=/etc/gateway/routes.yaml \
              -v $HOME/gateway/routes.yaml:/etc/gateway/routes.yaml:ro \
              -p 8080:8080 \
              $IMAGE

            # Verify container is running
            sleep 5
            if ! docker ps --filter "name=api-gateway" --filter "status=running" | grep -q api-gateway; then
              echo "Container failed to start"
              docker stop api-gateway || true
              docker rm api-gateway || true

              if [ -n "$PREVIOUS_IMAGE" ]; then
                echo "Rolling back to $PREVIOUS_IMAGE"
                docker run -d \
                  --name api-gateway \
                  --restart always \
                  -e PORT=${{ secrets.PORT }} \
                  -e LOG_LEVEL=${{ secrets.LOG_LEVEL }} \
                  -e RATE_LIMITER_URL=${{ secrets.RATE_LIMITER_URL }} \
                  -e ALLOW_PASSTHROUGH=${{ secrets.ALLOW_PASSTHROUGH }} \
                  -e MAX_BODY_MB=${{ secrets.MAX_BODY_MB }} \
                  -e REQUEST_TIMEOUT_SECONDS=${{ secrets.REQUEST_TIMEOUT_SECONDS }} \
                  -e METRICS_TOKEN=${{ secrets.METRICS_TOKEN }} \
                  -e ROUTES_FILE=/etc/gateway/routes.yaml \
                  -v $HOME/gateway/routes.yaml:/etc/gateway/routes.yaml:ro \
                  -p 8080:8080 \
                  $PREVIOUS_IMAGE
              else
                echo "No previous image to roll back to — this was the first deploy"
              fi
              exit 1
            fi

            echo "Deployment successful — running $IMAGE"
